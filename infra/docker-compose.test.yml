services:
  postgres-test:
    image: postgres:16-alpine
    container_name: mahou-hub-postgres-test
    environment:
      POSTGRES_USER: mahou
      POSTGRES_PASSWORD: mahou_test
      POSTGRES_DB: mahou_hub_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahou -d mahou_hub_test"]
      interval: 2s
      timeout: 2s
      retries: 10
