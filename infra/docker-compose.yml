services:
  postgres:
    image: postgres:16-alpine
    container_name: mahou-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mahou
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mahou_dev}
      POSTGRES_DB: mahou_hub
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - mahou_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahou -d mahou_hub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: ghcr.io/mahouprints/mahou-hub-api:latest
    container_name: mahou-hub-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://mahou:${POSTGRES_PASSWORD}@postgres:5432/mahou_hub
      STORAGE_DIR: /app/storage
    volumes:
      # Mapeia /var/mahou-storage da VPS no container. Nginx serve direto desse
      # diretório em media.mahouprints.com (mais rápido que passar pela API).
      - ${STORAGE_HOST_DIR:-/var/mahou-storage}:/app/storage
    profiles:
      - prod

volumes:
  mahou_pg_data:
