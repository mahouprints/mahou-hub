name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: mahou
          POSTGRES_PASSWORD: mahou_test
          POSTGRES_DB: mahou_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U mahou"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter @mahou-hub/contracts build
      - run: pnpm --filter @mahou-hub/pricing build

      - run: pnpm --filter @mahou-hub/pricing test
      - run: pnpm --filter @mahou-hub/contracts typecheck

      - run: pnpm --filter api exec prisma generate
        env:
          DATABASE_URL: postgresql://mahou:mahou_test@localhost:5432/mahou_hub_test

      - run: pnpm --filter api typecheck
      - run: pnpm --filter web typecheck
