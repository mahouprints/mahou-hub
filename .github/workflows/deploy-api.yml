name: Deploy API (VPS)

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'infra/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Configurar SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Rsync para VPS
        run: |
          rsync -az --delete \
            --exclude node_modules --exclude .turbo --exclude .next \
            ./ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/mahou-hub/

      - name: Build e restart na VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            cd /opt/mahou-hub
            docker compose --profile prod build api
            docker compose --profile prod up -d
            docker compose --profile prod exec -T api node -e "console.log('api up')"
          EOF
